repositories:
- name: kafka-ui
  url: https://provectus.github.io/kafka-ui
- name: prometheus
  url: https://prometheus-community.github.io/helm-charts
- name: grafana
  url: https://grafana.github.io/helm-charts
- name: kafka-lag-exporter
  url: https://seglo.github.io/kafka-lag-exporter/repo
- name: bitnami
  url: https://charts.bitnami.com/bitnami

releases:
- name: dbrs
  chart: ./dbrs
  namespace: devns1
  createNamespace: false
  values:
  - cp-helm-charts:
      cp-zookeeper:
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
        prometheus:
          jmx:
            requests:
              cpu: 250m
              memory: 512Mi
      cp-kafka:
        resources:
          requests:
            cpu: 1
            memory: 512Mi
        prometheus:
          jmx:
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
      cp-kafka-connect:
        resources:
          requests:
            cpu: 1
            memory: 512Mi
        prometheus:
          jmx:
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
      cp-kafka-rest:
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
        prometheus:
          jmx:
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
    kafka-ui:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
    prometheus:
      podSecurityPolicy:
        enabled: false
      rbac:
        create: false
      server:
        resources:
          requests:
            cpu: 1
            memory: 512Mi
      prometheus-node-exporter:
        enabled: false
      kube-state-metrics:
        enabled: false
      configmapReload:
        prometheus:
          enabled: false
    grafana:
      rbac:
        create: false
        pspEnabled: false
      sidecar:
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
    kafka-lag-exporter:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
    debezium_ui:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
    hammerdb:
      resources:
        requests:
          cpu: 1
          memory: 512Mi
- name: ora2my
  chart: ./setup2_ora2my
  namespace: devns1
  createNamespace: false
  values:
  - src_oracle:
      resources:
        requests:
          cpu: 4
          memory: 8Gi
    dwh-mysql:
      enabled: false
    dst-mysql:
      enabled: false
- name: dwh-mysql
  chart: bitnami/mysql
  version: 9.4.8
  namespace: devns1
  createNamespace: false
  values:
  - auth:
      database: tpcc
      username: dbrs
      password: Passw0rd
      rootPassword: Passw0rd
    resources:
      requests:
        cpu: 4
        memory: 8Gi
- name: dst-mysql
  chart: bitnami/mysql
  version: 9.4.8
  namespace: devns1
  createNamespace: false
  values:
  - auth:
      database: tpcc
      username: dbrs
      password: Passw0rd
      rootPassword: Passw0rd
    resources:
      requests:
        cpu: 4
        memory: 8Gi
